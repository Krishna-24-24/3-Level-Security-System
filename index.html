<!DOCTYPE html>
<html>
<head>
    <title>3 Level Security System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #dff1ff;
            text-align: center;
            padding-top: 25px;
        }

        h2 {
            color: #1a237e;
        }

        p {
            font-size: 14px;
            color: #222;
        }

        .box {
            width: 320px;
            margin: 18px auto;
            padding: 15px;
            border-radius: 6px;
            display: none;
        }

        #level1 {
            display: block;
            background-color: #fff9db;
            border: 1px solid #facc15;
        }

        #level2 {
            background-color: #fff0d9;
            border: 1px solid #ff9800;
        }

        #level3 {
            background-color: #f3e8ff;
            border: 1px solid #a855f7;
        }

        #success {
            background-color: #e6ffe6;
            border: 1px solid #4caf50;
        }

        h3 {
            margin-bottom: 8px;
            color: #333;
        }

        input {
            width: 90%;
            padding: 6px;
            margin: 6px 0;
            border: 1px solid #555;
            border-radius: 4px;
        }

        button {
            padding: 7px 14px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }

        button:hover {
            background-color: #1e40af;
        }

        #captcha,
        #decimal {
            font-size: 18px;
            font-weight: bold;
            margin: 6px 0;
        }
    </style>
</head>

<body>

    <h2>3 Level Security System</h2>
    <p>Complete all levels to login</p>

    <div class="box" id="level1">
        <h3>Level 1: Login</h3>
        <p>Enter your credentials to proceed</p>

        <input type="text" id="user" placeholder="Username"><br>
        <input type="password" id="pass" placeholder="Password"><br>

        <button onclick="login()">Login</button>
    </div>

    <div class="box" id="level2">
        <h3>Level 2: Captcha</h3>
        <p>Evaluate the expression</p>

        <p id="captcha"></p>

        <button onclick="makeCaptcha()">Refresh Captcha</button><br>

        <input type="text" id="capInput" placeholder="Answer"><br>

        <button onclick="checkCaptcha()">Submit</button>
    </div>

    <div class="box" id="level3">
        <h3>Level 3</h3>
        <p>Convert the Number to Binary</p>

        <p id="decimal"></p>
        <input type="text" id="binary" placeholder="Binary value"><br>

        <button onclick="checkBinary()">Check</button>
    </div>

    <div class="box" id="success">
        <h3>Success!!</h3>
        <p>Access Granted</p>
        <p>Welcome to Krishna's Web Project!!</p>
    </div>

    <script>
        let a, b, num, bin;

        function login() {
            let u = document.getElementById("user").value;
            let p = document.getElementById("pass").value;

            if (u == "Krishna" && p == "24BCE0592") {
                document.getElementById("level1").style.display = "none";
                document.getElementById("level2").style.display = "block";
                makeCaptcha();
            } else {
                alert("Invalid Credentials");
            }
        }

        function makeCaptcha() {
            a = Math.floor(Math.random() * 10);
            b = Math.floor(Math.random() * 10);
            document.getElementById("captcha").innerHTML = a + " + " + b;
            document.getElementById("capInput").value = "";
        }

        function checkCaptcha() {
            let ans = document.getElementById("capInput").value;

            if (ans == a + b) {
                document.getElementById("level2").style.display = "none";
                document.getElementById("level3").style.display = "block";
                makeBinary();
            } else {
                alert("Invalid Captcha");
            }
        }

        function makeBinary() {
            num = Math.floor(Math.random() * 10) + 5;
            bin = num.toString(2);
            document.getElementById("decimal").innerHTML = num;
        }

        function checkBinary() {
            let userBin = document.getElementById("binary").value;

            if (userBin == bin) {
                document.getElementById("level3").style.display = "none";
                document.getElementById("success").style.display = "block";
            } else {
                alert("Wrong binary value");
            }
        }
    </script>

</body>
</html>
